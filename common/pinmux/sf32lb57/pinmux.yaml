# LCDC_IFn matrix signals are abstract. Use this table to resolve
# the actual LCDC signal for a selected LCDC interface mode.
lcdc_mux:
  selector: IF_SEL
  modes:
    - {name: SPI, if_sel: 0}
    - {name: JDI, if_sel: 0}
    - {name: EPD, if_sel: 1}
    - {name: DBI, if_sel: 2}
    - {name: DPI, if_sel: 3}
  signals:
    - function: LCDC_IF0
      modes: {SPI: LCDC_SPI_TE, EPD: LCDC_TCON_GDSP, DBI: LCDC_8080_TE, DPI: LCDC_DPI_CLK}
