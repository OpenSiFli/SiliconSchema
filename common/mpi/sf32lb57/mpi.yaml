# SF32LB57 系列 MPI (Memory Port Interface) 配置

mpis:
  mpi1:
    sip: true
    base:
      offset: 0x60000000
      size: 0x2000000      # 32MB
    xip:
      offset: 0x10000000   # CBUS
      size: 0x2000000      # 32MB

  mpi2:
    sip: true
    base:
      offset: 0x62000000
      size: 0x2000000      # 32MB
    xip:
      offset: 0x12000000   # CBUS
      size: 0x2000000      # 32MB

  mpi3:
    sip: true
    base:
      offset: 0x64000000
      size: 0x2000000      # 32MB
    xip:
      offset: 0x14000000   # CBUS
      size: 0x2000000      # 32MB
